.gem-letter {
  display: inline-block;
  position: relative;
  transform-style: preserve-3d;
  animation: letterFloat 6s ease-in-out infinite;
  filter: brightness(1.2);
}

.gem-letter:nth-child(1) { animation-delay: 0s; }
.gem-letter:nth-child(2) { animation-delay: 0.2s; }
.gem-letter:nth-child(3) { animation-delay: 0.4s; }
.gem-letter:nth-child(4) { animation-delay: 0.6s; }
.gem-letter:nth-child(5) { animation-delay: 0.8s; }

@keyframes letterFloat {
  0%, 100% { transform: translateY(0px) rotateX(2deg) rotateY(2deg); }
  50% { transform: translateY(-8px) rotateX(5deg) rotateY(5deg); }
}

.gem-letter::before {
  content: attr(data-letter);
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    145deg,
    #7CFC00 0%,
    #00FA9A 15%,
    #2E8B57 30%,
    #228B22 45%,
    #006400 60%,
    #0A5C2E 75%,
    #013220 90%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 
    0 0 20px rgba(124,252,0,0.5),
    2px 2px 4px rgba(0,0,0,0.3);
  transform: translateZ(2px);
}

.gem-letter[data-letter="P"]::before,
.gem-letter[data-letter="X"]::before {
  background: linear-gradient(
    145deg,
    #050f22 0%,
    #0b1f4a 15%,
    #123a7a 30%,
    #1a4fb0 45%,
    #2a66e0 60%,
    #1a4fb0 75%,
    #0b1f4a 90%

  background-clip: text;
  text-shadow: 
    0 0 18px rgba(60,120,255,0.35),
    2px 2px 4px rgba(0,0,0,0.3);
}

.gem-letter[data-letter="A"]::before {
  background: linear-gradient(
    145deg,
    #2a0000 0%,
    #4a0000 15%,
    #7a0b0b 30%,
    #a61a1a 45%,
    #d92b2b 60%,
    #a61a1a 75%,
    #4a0000 90%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 
    0 0 18px rgba(255,60,60,0.35),
    2px 2px 4px rgba(0,0,0,0.3);
}

  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--text);
  border: 1px solid transparent;
}

.nav-item:hover, .nav-item.active {
  background: rgba(74, 158, 90, 0.15);
  border-color: rgba(74, 158, 90, 0.5);
  color: #4a9e5a;
  transform: translateX(4px);
}

.nav-icon {
  font-size: 18px;
}

/* Main Content Area */
.main-content {
  background: rgba(15, 32, 64, 0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 30px;
  backdrop-filter: blur(10px);
}

/* Stats Grid - Matching your card style */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 30px;

  border-collapse: collapse;
